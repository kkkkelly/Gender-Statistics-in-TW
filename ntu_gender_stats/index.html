<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>頂大男女在學人數趨勢分析</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .controls {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .control-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        .control-item {
            flex: 1;
            min-width: 200px;
        }

        .control-item label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .control-item select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .control-item select:hover {
            border-color: #667eea;
        }

        .control-item select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .chart-container {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            margin-bottom: 25px;
        }

        .chart-wrapper {
            position: relative;
            height: 450px;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            text-align: center;
        }

        .stat-card.male {
            border-top: 4px solid #36A2EB;
        }

        .stat-card.female {
            border-top: 4px solid #FF6384;
        }

        .stat-card.trend {
            border-top: 4px solid #4BC0C0;
        }

        .stat-card h3 {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #333;
        }

        .stat-card .subtext {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
        }

        .data-source {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .data-source h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .data-source p {
            color: #666;
            line-height: 1.8;
        }

        .data-source a {
            color: #667eea;
            text-decoration: none;
        }

        .data-source a:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            opacity: 0.8;
        }

        .raw-data {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            margin-bottom: 25px;
            overflow-x: auto;
        }

        .raw-data h3 {
            color: #333;
            margin-bottom: 20px;
        }

        .raw-data table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .raw-data th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 15px;
            text-align: center;
            font-weight: 600;
        }

        .raw-data th:first-child {
            border-radius: 8px 0 0 0;
        }

        .raw-data th:last-child {
            border-radius: 0 8px 0 0;
        }

        .raw-data td {
            padding: 12px 15px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .raw-data tr:hover {
            background-color: #f8f9ff;
        }

        .raw-data tr:last-child td:first-child {
            border-radius: 0 0 0 8px;
        }

        .raw-data tr:last-child td:last-child {
            border-radius: 0 0 8px 0;
        }

        .raw-data .male-cell {
            color: #36A2EB;
            font-weight: 600;
        }

        .raw-data .female-cell {
            color: #FF6384;
            font-weight: 600;
        }

        .raw-data .total-cell {
            color: #333;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }
            
            .chart-wrapper {
                height: 350px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 頂大男女在學人數趨勢分析</h1>
            <p>台大、清大、陽明交大、政大 各系所性別比例十年趨勢 (2015-2024)</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <div class="control-item">
                    <label for="dataType">統計類型</label>
                    <select id="dataType">
                        <option value="enrolled">在學人數</option>
                        <option value="freshman">當年度新生</option>
                    </select>
                </div>
                <div class="control-item">
                    <label for="university">大學</label>
                    <select id="university">
                        <option value="all">全部大學</option>
                    </select>
                </div>
                <div class="control-item">
                    <label for="college">學院</label>
                    <select id="college">
                        <option value="all">全部學院</option>
                    </select>
                </div>
                <div class="control-item">
                    <label for="department">系所</label>
                    <select id="department">
                        <option value="all">全部系所</option>
                    </select>
                </div>
                <div class="control-item">
                    <label for="level">學制</label>
                    <select id="level">
                        <option value="all">全部學制</option>
                        <option value="bachelor">學士班</option>
                        <option value="master">碩士班</option>
                        <option value="phd">博士班</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="stats-cards">
            <div class="stat-card male">
                <h3>最新年度男性比例</h3>
                <div class="value" id="malePercent">--</div>
                <div class="subtext" id="maleCount">--</div>
            </div>
            <div class="stat-card female">
                <h3>最新年度女性比例</h3>
                <div class="value" id="femalePercent">--</div>
                <div class="subtext" id="femaleCount">--</div>
            </div>
            <div class="stat-card trend">
                <h3>十年女性比例變化</h3>
                <div class="value" id="trendValue">--</div>
                <div class="subtext" id="trendDesc">--</div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-wrapper">
                <canvas id="genderChart"></canvas>
            </div>
        </div>

        <div class="raw-data">
            <h3>📋 原始數據</h3>
            <table id="rawDataTable">
                <thead>
                    <tr>
                        <th>年度</th>
                        <th>男性人數</th>
                        <th>女性人數</th>
                        <th>總人數</th>
                        <th>男性比例</th>
                        <th>女性比例</th>
                    </tr>
                </thead>
                <tbody id="rawDataBody">
                </tbody>
            </table>
        </div>

        <div class="data-source">
            <h3>📊 資料來源與說明</h3>
            <p>
                本圖表資料可從以下來源取得：<br>
                • <a href="https://stats.moe.gov.tw/" target="_blank">教育部統計處</a> - 大專校院校務資訊公開<br>
                • <a href="https://www.aca.ntu.edu.tw/" target="_blank">台大教務處</a> - 學生人數統計<br><br>
                目前顯示為示範資料，您可以編輯 <code>data.js</code> 檔案來更新實際統計數據。
            </p>
        </div>

        <footer>
            <p>Side Project - 頂大男女在學人數統計 | 資料僅供參考</p>
        </footer>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
